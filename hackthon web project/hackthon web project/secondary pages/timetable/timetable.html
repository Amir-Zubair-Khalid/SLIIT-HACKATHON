<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Keeper | Timetable</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/00 - images/unnamed.png">
    
    <script src="time.js"></script>
    <script src="../nav.js"></script>
<script>
  function Home() { window.location.href = "../../index.html" }
  function Notes() { window.location.href = "../lecture%20notes/lecture.html" }
  function Time()  { window.location.href = "../timetable/timetable.html" }
  function Guides(){ window.location.href = "../guides/guides.html" }
  function Events(){ window.location.href = "../events/events.html" }
</script>
</head>

<body>

    <header id="header">
        <div id="imgtitle">
            <img src="../../00 - images/wall-clock.png" alt="Logo" width="50px">
            <h1 id="title">Time Keeper</h1>
        </div>

        <nav id="links">
            <button class="nav-btn" onclick="Notes()">Lecture Notes</button>
            <button class="nav-btn active-page" onclick="Time()">Time Table</button>
            <button class="nav-btn" onclick="Guides()">Guides</button>
            <button class="nav-btn" onclick="Events()">Events</button>
            <button class="nav-btn" onclick="Home()">Home</button>
        </nav>
    </header>

    <div id="selectors">
        <select id="TimeComparerV1">
            <option value="1.1">Group 1 Sub 1</option>
            <option value="1.2">Group 1 Sub 2</option>
            <option value="2.1">Group 2 Sub 1</option>
            <option value="2.2">Group 2 Sub 2</option>
            <option value="3.1">Group 3 Sub 1</option>
            <option value="3.2">Group 3 Sub 2</option>
        </select>

        <select id="TimeComparerV2">
            <option value="1.1">Group 1 Sub 1</option>
            <option value="1.2">Group 1 Sub 2</option>
            <option value="2.1">Group 2 Sub 1</option>
            <option value="2.2">Group 2 Sub 2</option>
            <option value="3.1">Group 3 Sub 1</option>
            <option value="3.2">Group 3 Sub 2</option>
        </select>

        <button id="TimeTableSubmit" onclick="Compare()">Submit</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>TIME</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>8:30 - 10:30</td>
                <td id="1.1">--</td>
                <td id="1.2">--</td>
                <td id="1.3">--</td>
                <td id="1.4">--</td>
                <td>ONLINE</td>
            </tr>
            <tr>
                <td>10:30 - 12:30</td>
                <td id="2.1">--</td>
                <td id="2.2">--</td>
                <td id="2.3">--</td>
                <td id="2.4">--</td>
                <td>ONLINE</td>
            </tr>
            <tr class="interval">
                <td colspan="6">INTERVAL</td>
            </tr>
            <tr>
                <td>1:30 - 3:30</td>
                <td id="3.1">--</td>
                <td id="3.2">--</td>
                <td id="3.3">--</td>
                <td id="3.4">--</td>
                <td>ONLINE</td>
            </tr>
            <tr>
                <td>3:30 - 5:30</td>
                <td id="4.1">--</td>
                <td id="4.2">--</td>
                <td id="4.3">--</td>
                <td id="4.4">--</td>
                <td>ONLINE</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
